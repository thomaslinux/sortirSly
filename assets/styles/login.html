<!DOCTYPE html>

<html lang="fr"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #412b40;
            --primary-container: #594157;
            --on-primary: #ffffff;
            --secondary: #5c5891;
            --tertiary: #1f2f61;
            --surface: #e4ffff;
            --surface-container: #ccf6f7;
            --surface-container-low: #d2fbfc;
            --surface-container-lowest: #ffffff;
            --on-surface: #002021;
            --on-surface-variant: #4c444a;
            --outline: #7e747b;
            --outline-variant: #cfc3ca;
            --primary-fixed: #fad9f4;
            --secondary-container: #c3bdfd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .ethereal-bg {
            background: radial-gradient(circle at 0% 0%, #e4ffff 0%, #d2fbfc 50%, #fad9f4 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .decorative-blob-1 {
            position: fixed;
            top: -10%;
            right: -5%;
            width: 40%;
            height: 40%;
            background-color: rgba(195, 189, 253, 0.2);
            filter: blur(120px);
            border-radius: 9999px;
            z-index: -5;
        }

        .decorative-blob-2 {
            position: fixed;
            bottom: -5%;
            left: -5%;
            width: 30%;
            height: 30%;
            background-color: rgba(250, 217, 244, 0.3);
            filter: blur(100px);
            border-radius: 9999px;
            z-index: -5;
        }

        /* Header Styles */
        .site-header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 50;
            background-color: rgba(228, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            box-shadow: 0 10px 30px rgba(89, 65, 87, 0.04);
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.5rem;
            max-width: 80rem;
            margin: 0 auto;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: -0.05em;
            text-decoration: none;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            color: var(--on-surface-variant);
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            color: var(--primary-container);
        }

        .btn-register {
            background-color: var(--primary-container);
            color: var(--on-primary);
            padding: 0.5rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
        }

        .btn-register:hover {
            transform: scale(0.95);
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 28rem;
            background-color: var(--surface-container-lowest);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(89, 65, 87, 0.08);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .card-title {
            font-size: 1.875rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            color: var(--on-surface-variant);
            font-size: 0.875rem;
        }

        /* Form Elements */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--tertiary);
            margin-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            background-color: var(--surface-container-low);
            border: none;
            border-radius: 0.75rem;
            padding: 1rem 1.25rem;
            color: var(--on-surface);
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(92, 88, 145, 0.2);
        }

        .form-input::placeholder {
            color: rgba(126, 116, 123, 0.5);
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--outline);
            pointer-events: none;
        }

        /* Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .checkbox-custom {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-input {
            appearance: none;
            width: 1.25rem;
            height: 1.25rem;
            border-radius: 0.375rem;
            background-color: var(--surface-container-high);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .checkbox-input:checked {
            background-color: var(--primary);
        }

        .checkbox-icon {
            position: absolute;
            font-size: 0.875rem;
            color: white;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .checkbox-input:checked + .checkbox-icon {
            opacity: 1;
        }

        .checkbox-text {
            color: var(--on-surface-variant);
            transition: color 0.2s ease;
        }

        .checkbox-container:hover .checkbox-text {
            color: var(--primary);
        }

        .forgot-link {
            color: var(--tertiary);
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s ease;
        }

        .forgot-link:hover {
            border-bottom-color: var(--tertiary);
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, var(--primary), var(--primary-container));
            color: var(--on-primary);
            font-weight: 700;
            border: none;
            border-radius: 0.75rem;
            box-shadow: 0 10px 20px rgba(65, 43, 64, 0.2);
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-submit:hover {
            transform: scale(0.98);
        }

        .btn-submit:active {
            transform: scale(0.95);
        }

        /* Divider */
        .divider {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 2.5rem 0 2rem;
        }

        .divider-line {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
        }

        .divider-line::after {
            content: "";
            width: 100%;
            border-top: 1px solid rgba(207, 195, 202, 0.3);
        }

        .divider-text {
            position: relative;
            background-color: var(--surface-container-lowest);
            padding: 0 1rem;
            font-size: 0.75rem;
            color: var(--outline);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Social Login */
        .social-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background-color: var(--surface-container-low);
            border: 1px solid transparent;
            border-radius: 0.75rem;
            color: var(--on-surface);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-social:hover {
            background-color: #c7f0f1;
            border-color: rgba(207, 195, 202, 0.2);
        }

        .social-logo {
            width: 1.25rem;
            height: 1.25rem;
        }

        .signup-prompt {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.875rem;
            color: var(--on-surface-variant);
        }

        .signup-link {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            margin-left: 0.25rem;
            transition: border-color 0.2s ease;
        }

        .signup-link:hover {
            border-bottom-color: var(--primary);
        }

        /* Footer */
        .site-footer {
            width: 100%;
            padding: 3rem 2rem;
            background-color: var(--surface-container-low);
        }

        .footer-container {
            max-width: 80rem;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .footer-container {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .footer-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @media (min-width: 768px) {
            .footer-brand {
                align-items: flex-start;
            }
        }

        .footer-logo {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--primary);
        }

        .footer-copy {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--tertiary);
        }

        .footer-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2rem;
        }

        .footer-link {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--on-surface-variant);
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 4px;
            opacity: 0.8;
            transition: opacity 0.2s ease;
        }

        .footer-link:hover {
            opacity: 1;
            color: var(--primary-container);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body>
<div class="ethereal-bg"></div>
<div class="decorative-blob-1"></div>
<div class="decorative-blob-2"></div>
<header class="site-header">
    <div class="header-container">
        <a class="brand-logo" href="#">ENI'Where</a>
        <nav class="header-nav">
            <a class="nav-link" href="#">Aide</a>
            <a class="btn-register" href="#">S'inscrire</a>
        </nav>
    </div>
</header>
<main class="main-content">
    <div class="login-card">
        <div class="card-header">
            <h1 class="card-title">Bon retour</h1>
            <p class="card-subtitle">Connectez-vous pour explorer les sorties curatées.</p>
        </div>
        <form class="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Identifiant</label>
                <div class="input-wrapper">
                    <input class="form-input" id="username" name="username" placeholder="votre@email.com" type="text"/>
                    <span class="material-symbols-outlined input-icon">alternate_email</span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Mot de passe</label>
                <div class="input-wrapper">
                    <input class="form-input" id="password" name="password" placeholder="••••••••" type="password"/>
                    <span class="material-symbols-outlined input-icon">lock</span>
                </div>
            </div>
            <div class="form-options">
                <label class="checkbox-container">
                    <div class="checkbox-custom">
                        <input class="checkbox-input" type="checkbox"/>
                        <span class="material-symbols-outlined checkbox-icon">check</span>
                    </div>
                    <span class="checkbox-text">Se souvenir de moi</span>
                </label>
                <a class="forgot-link" href="#">Mot de passe oublié</a>
            </div>
            <button class="btn-submit" type="submit">Connexion</button>
        </form>
        <div class="divider">
            <div class="divider-line"></div>
            <span class="divider-text">Ou continuer avec</span>
        </div>
        <div class="social-container">
            <button class="btn-social">
                <img alt="Google Logo" class="social-logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBdFey6xVzL4Es-iBvQ_S5Ehiagdus0Vp0bKMZEf-NTLgOGDHrEXwNP1mzWefFrHiMxvAZXVbUlIjvI6p7BUzD17N8tJszwtnShO7KEisF5s4zLJW3F-P0m5JekwATv19x9PpE1aJqvCQw2dz6dE0F27MO48HJ8dhVfJ4QJKtvhRw1zWC63NSRQ15gkmBCAMZ4n8CcqnUA1xR_-tDSLtjjr1rMj63tds2SygOW-kVp2LYksJvHy_RDTXpL0HZE5ihc9Mqe4TyTgdGj4"/>
                <span>Google</span>
            </button>
            <button class="btn-social">
                <img alt="Apple Logo" class="social-logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqR0Jyo9_IoVDy9AAkuvLAaSOcMlMwIlabfK9w2UWz-cQrIjwxP9__x94mzDvXeTymDKOS5iM3ZlPb0VwIEve2ZbCF7MwB8FKyjIpziAsQEKh3pXJq1ZQHRRi2_CEjvhXuHDHQR6pEGOsuhZQp2QkVm2MZIpjYKWPGMFB45q-mixjpZGgGEaPRBJdwdsLUatPYQlkUlfnzRHWIzIfK3KTJJk5EXozJ0kH68c1rGjXpZlMF4uTB3wKsunmRu47WMm-PL5rGPjPEBose"/>
                <span>Apple</span>
            </button>
        </div>
        <p class="signup-prompt">
            Pas encore de compte ?
            <a class="signup-link" href="#">Créer un compte</a>
        </p>
    </div>
</main>
<footer class="site-footer">
    <div class="footer-container">
        <div class="footer-brand">
            <span class="footer-logo">ENI'Where</span>
            <span class="footer-copy">© 2024 ENI'Where. L'Ethereal Curator.</span>
        </div>
        <nav class="footer-nav">
            <a class="footer-link" href="#">Confidentialité</a>
            <a class="footer-link" href="#">Conditions</a>
            <a class="footer-link" href="#">Contact</a>
            <a class="footer-link" href="#">Support</a>
        </nav>
    </div>
</footer>
</body></html>
