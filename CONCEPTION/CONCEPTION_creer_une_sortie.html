<!DOCTYPE html>

<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Créer une sortie | ENI'Where</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
          rel="stylesheet"/>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet"/>
    <link rel="stylesheet" href="CONCEPTION_creer_une_sortie.css">
    <link rel="stylesheet" href="../assets/styles/eniwhere2.css">
    <link rel="stylesheet" href="../assets/styles/creer_une_sortie_thomas.css">
</head>
<body>
<!-- TopNavBar -->
<nav class="navbar">
    <div class="nav-brand">
        <a class="logo" href="#">ENI'Where</a>
        <div class="nav-links">
            <a class="nav-link" href="#">Events</a>
            <a class="nav-link" href="#">Campus</a>
            <a class="nav-link" href="#">Map</a>
            <a class="nav-link" href="#">Community</a>
        </div>
    </div>
    <div class="nav-actions">
        <button class="icon-btn"><span class="material-symbols-outlined">notifications</span></button>
        <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
        <div class="user-avatar">
            <img alt="User profile"
                 src="https://lh3.googleusercontent.com/aida-public/AB6AXuD5GD_MoyGWXJFsHAcf1B_idG4zLYfu_uBIqD1lJ-TjqjjvwljWy6wCxQXX9BVlwyifRevSuzXIdOClpwHyj7Iwf_pUfNoDXkOLwHzxKKnhawC_SvcxUX0ywkLpHqwjCYhvM_9k-sQQbs1pjS075UykjjoOTOFZsknfCjpZrgaLgHCWHOvDWySTpnWsCJWwps4QfdLw-3cvTirjSmc2kymenlaIzzYHTkkdsbZUV2Bde0D4OAWnRYg7h3AbaUw_SUCT7g2i3483djk6"/>
        </div>
    </div>
</nav>
<main class="container">
    <h2>Créer une sortie</h2>
    <!-- Form Section -->
    <form class="event-form">
        <!-- Left Column: Informations Générales -->
        <section class="form-section section-general">
            <div class="section-header">
                <span class="material-symbols-outlined">info</span>
                <h2 class="section-title text-primary">Informations Générales</h2>
            </div>
            <div class="form-group-list">
                <div class="input-group">
                    <label class="form-label">Nom de la sortie</label>
                    <input class="form-input" placeholder="Ex: Afterwork au V&amp;B" type="text"/>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label class="form-label">Date et heure</label>
                        <input class="form-input" type="datetime-local"/>
                    </div>
                    <div class="input-group">
                        <label class="form-label">Limite d'inscription</label>
                        <input class="form-input" type="date"/>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-group">
                        <label class="form-label">Nombre de places</label>
                        <input class="form-input" min="1" placeholder="10" type="number"/>
                    </div>
                    <div class="input-group">
                        <label class="form-label">Durée (minutes)</label>
                        <input class="form-input" min="15" placeholder="120" step="15" type="number"/>
                    </div>
                </div>
                <div class="input-group">
                    <label class="form-label">Description et infos</label>
                    <textarea class="form-input"
                              placeholder="Décrivez l'événement, les points de rendez-vous ou les prérequis..."
                              rows="6"></textarea>
                </div>
            </div>
        </section>
        <!-- Right Column: Lieu & Logistique -->
        <section class="form-section section-logistics">
            <div class="section-header">
                <span class="material-symbols-outlined">location_on</span>
                <h2 class="section-title text-primary">Lieu &amp; Logistique</h2>
            </div>
            <div class="form-group-list">
                <div class="input-row">
                    <div class="input-group">
                        <label class="form-label">Campus</label>
                        <select class="form-input">
                            <option>Nantes</option>
                            <option>Rennes</option>
                            <option>Niort</option>
                            <option>Quimper</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="form-label">Ville</label>
                        <select class="form-input">
                            <option>Saint-Herblain</option>
                            <option>Chartres-de-Bretagne</option>
                            <option>Niort Centre</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label class="form-label">Lieu</label>
                    <div class="input-with-action">
                        <select class="form-input">
                            <option>V&amp;B Atlantis</option>
                            <option>Le Melocotton</option>
                            <option>Parc de Procé</option>
                        </select>
                        <button class="btn-add" type="button">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                </div>
                <div class="input-row-3">
                    <div class="input-group">
                        <label class="form-label">Rue</label>
                        <input class="form-input" placeholder="Rue de la paix" type="text"/>
                    </div>
                    <div class="input-group">
                        <label class="form-label">Code Postal</label>
                        <input class="form-input" placeholder="44000" type="text"/>
                    </div>
                </div>
                <div class="gps-card">
                    <div class="gps-header">
                        <span>Coordonnées GPS auto</span>
                        <span class="material-symbols-outlined" style="font-size: 1rem; color: var(--secondary);">gps_fixed</span>
                    </div>
                    <div class="gps-coords">
                        <div class="coord-item">
                            <label>LATITUDE</label>
                            <input readonly="" type="text" value="47.2184"/>
                        </div>
                        <div class="coord-item">
                            <label>LONGITUDE</label>
                            <input readonly="" type="text" value="-1.5536"/>
                        </div>
                    </div>
                </div>
                <div class="map-container">
                    <img alt="City map"
                         src="https://lh3.googleusercontent.com/aida-public/AB6AXuCARTIFH-7Z0bwBslHKFVKYjGz_zJ27f17GXhpIorV1HwjTvJ-9sF2FshRNlr2ttZaVdUSjRoCGdZDtjYby4_V8U-rTosgDtq-N6BBMVgNWNhkrd4uFXLkIQWyo2soDDSlXn_s9xiaRTk3Vbg1DAsEN45izRBLgtCmRUsZlcJI0wZqKwqtnwcjHgWEppmmUf3BXRJ_SOZ9PHuTaiET931BRx2AK7wUz2LYahWN_0NaKScuAO9AW7EK8F_y_Rq3rslzyUavrQE6MeXAP"/>
                </div>
            </div>
        </section>
        <!-- Actions Footer -->
        <footer class="form-footer">
            <button class="btn-cancel" type="button">Annuler</button>
            <button class="btn-outline" type="button">Enregistrer</button>
            <button class="btn-primary" type="submit">
                <span class="material-symbols-outlined">rocket_launch</span>
                Publier la sortie
            </button>
        </footer>
    </form>
</main>

<!-- Footer -->
<footer class="site-footer">
    <div class="site-footer-content">
        <div class="footer-brand">
            <span class="footer-logo">ENI'Where</span>
            <p class="copyright">© 2024 ENI'Where. Professional Event Curation.</p>
        </div>
        <div class="footer-links">
            <a class="footer-link" href="#">Privacy Policy</a>
            <a class="footer-link" href="#">Terms of Service</a>
            <a class="footer-link" href="#">Support</a>
            <a class="footer-link" href="#">Contact Us</a>
        </div>
    </div>
</footer>
</body>
</html>
